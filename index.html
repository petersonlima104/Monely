<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1c3faa" />

    <title>Monely</title>

    <link rel="stylesheet" href="css/style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <!-- LOGIN -->

    <div id="loginArea" class="login-container">
      <div class="login-card">
        <h3 class="mb-4">Monely</h3>

        <p class="text-muted mb-4">Controle financeiro simples</p>

        <button onclick="loginGoogle()" class="btn btn-google w-100">
          Entrar com Google
        </button>
      </div>
    </div>

    <!-- DASHBOARD -->

    <div id="dashboard" style="display: none">
      <div class="container mt-4">
        <div class="top-bar">
          <h4 class="title">Dashboard</h4>

          <div class="d-flex gap-2">
            <select id="mesSelector" class="form-select"></select>

            <button onclick="logout()" class="btn btn-outline-light btn-sm">
              Logout
            </button>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-12 col-md-4">
            <div class="card-finance entrada">
              <h6><i class="bi bi-arrow-down-circle"></i> Entradas</h6>
              <h3 id="totalEntradas">R$0</h3>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="card-finance saida">
              <h6><i class="bi bi-arrow-up-circle"></i> Saídas</h6>
              <h3 id="totalSaidas">R$0</h3>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="card-finance saldo">
              <h6><i class="bi bi-wallet2"></i> Saldo</h6>
              <h3 id="saldo">R$0</h3>
            </div>
          </div>
        </div>

        <div class="row mt-4 g-3">
          <div class="col-12 col-lg-6">
            <div class="card-list">
              <h5><i class="bi bi-cash-stack"></i> Rendimentos</h5>

              <ul id="listaRendas" class="list-group mb-3"></ul>

              <button
                class="btn btn-success w-100"
                data-bs-toggle="modal"
                data-bs-target="#modalRenda"
              >
                Adicionar rendimento
              </button>
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="card-list">
              <h5><i class="bi bi-receipt"></i> Contas</h5>

              <ul id="listaContas" class="list-group mb-3"></ul>

              <button
                class="btn btn-danger w-100"
                data-bs-toggle="modal"
                data-bs-target="#modalConta"
              >
                Adicionar conta
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL RENDA -->

    <div class="modal fade" id="modalRenda">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Adicionar rendimento</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input
              id="rendaDesc"
              class="form-control mb-2"
              placeholder="Descrição"
            />

            <input
              id="rendaValor"
              type="number"
              class="form-control mb-2"
              placeholder="Valor"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>

            <button
              onclick="addRenda()"
              class="btn btn-success"
              data-bs-dismiss="modal"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL CONTA -->

    <div class="modal fade" id="modalConta">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Adicionar conta</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input
              id="contaDesc"
              class="form-control mb-2"
              placeholder="Descrição"
            />

            <input
              id="contaValor"
              type="number"
              class="form-control mb-2"
              placeholder="Valor"
            />

            <input id="contaData" type="date" class="form-control mb-2" />

            <select id="contaTipo" class="form-control mb-2">
              <option value="fixa">Fixa</option>
              <option value="variavel">Variável</option>
            </select>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>

            <button
              onclick="addConta()"
              class="btn btn-danger"
              data-bs-dismiss="modal"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/sw.js")
          .then(() => console.log("Service Worker registrado"))
          .catch((err) => console.log("Erro SW:", err));
      }
    </script>
  </body>
</html>
