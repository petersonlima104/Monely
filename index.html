<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Monely</title>

    <link rel="stylesheet" href="css/style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- LOGIN GOOGLE -->

    <div
      id="loginArea"
      class="container mt-5 text-center"
      style="max-width: 400px"
    >
      <div class="card shadow p-4">
        <h4 class="mb-4">Bem vindo ao Monely</h4>

        <button onclick="loginGoogle()" class="btn btn-danger w-100">
          Entrar com Google
        </button>
      </div>
    </div>

    <!-- DASHBOARD -->

    <div id="dashboard" style="display: none">
      <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>Dashboard Financeiro</h2>

          <button onclick="logout()" class="btn btn-outline-danger">
            Logout
          </button>
        </div>

        <div class="row">
          <div class="col-md-4">
            <div class="card shadow p-3">
              <h6>Entradas</h6>
              <h3 id="totalEntradas" class="text-success">R$0</h3>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow p-3">
              <h6>Saídas</h6>
              <h3 id="totalSaidas" class="text-danger">R$0</h3>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow p-3">
              <h6>Saldo</h6>
              <h3 id="saldo" class="text-primary">R$0</h3>
            </div>
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-md-6">
            <div class="card shadow p-3">
              <h5>Rendimentos</h5>

              <ul id="listaRendas" class="list-group mb-3"></ul>

              <button
                class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#modalRenda"
              >
                Adicionar rendimento
              </button>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card shadow p-3">
              <h5>Contas</h5>

              <ul id="listaContas" class="list-group mb-3"></ul>

              <button
                class="btn btn-danger"
                data-bs-toggle="modal"
                data-bs-target="#modalConta"
              >
                Adicionar conta
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL RENDA -->

    <div class="modal fade" id="modalRenda">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Adicionar rendimento</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input
              id="rendaDesc"
              class="form-control mb-2"
              placeholder="Descrição"
            />

            <input
              id="rendaValor"
              type="number"
              class="form-control mb-2"
              placeholder="Valor"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>

            <button
              onclick="addRenda()"
              class="btn btn-success"
              data-bs-dismiss="modal"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL CONTA -->

    <div class="modal fade" id="modalConta">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Adicionar conta</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input
              id="contaDesc"
              class="form-control mb-2"
              placeholder="Descrição"
            />

            <input
              id="contaValor"
              type="number"
              class="form-control mb-2"
              placeholder="Valor"
            />

            <input id="contaData" type="date" class="form-control mb-2" />

            <select id="contaTipo" class="form-control mb-2">
              <option value="fixa">Fixa</option>
              <option value="variavel">Variável</option>
            </select>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>

            <button
              onclick="addConta()"
              class="btn btn-danger"
              data-bs-dismiss="modal"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
